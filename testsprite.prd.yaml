version: 1
suite: "IPPAN Real-Mode Core"
vars:
  NODE_A: "http://188.245.97.41:3000"
  NODE_B: "http://135.181.145.174:3000"
  FROM: "iSender1111111111111111111111111111111111111"
  TO: "iRbDqSo0H4NxPGC0q55ohG36JrvlcYGvM3DpS4Q"
  AMOUNT: "25000"
  FEE: "10"

tests:
  - id: health-a
    name: "Node A status (real mode)"
    steps:
      - run: curl -sS ${NODE_A}/api/v1/status
        expect_json:
          has_keys: ["height","peers","latest_block_hash"]
          gt:
            height: 0

  - id: health-b
    name: "Node B status (peered)"
    steps:
      - run: curl -sS ${NODE_B}/api/v1/status
        expect_json:
          has_keys: ["height","peers"]
          gte:
            peers: 1

  - id: validate-address
    name: "Validate receiver address"
    steps:
      - run: curl -sS "${NODE_A}/api/v1/address/validate?address=${TO}"
        expect_json:
          eq:
            valid: true

  - id: submit-tx
    name: "Submit signed tx (happy path)"
    setup:
      - gen_tx:
          from: ${FROM}
          to: ${TO}
          amount: ${AMOUNT}
          fee: ${FEE}
          nonce: 1
          sign: ed25519
          out: /tmp/tx.json
    steps:
      - run: curl -sS -X POST ${NODE_A}/api/v1/tx/submit -H "Content-Type: application/json" --data @/tmp/tx.json
        capture_json:
          tx_id: "$.tx_id"
      - wait_for:
          timeout_ms: 8000
          every_ms: 500
          run: curl -sS ${NODE_A}/api/v1/tx/{{tx_id}}
          expect_json:
            eq:
              status: "included"

  - id: cross-node-visibility
    name: "Tx visible on Node B"
    steps:
      - run: curl -sS ${NODE_B}/api/v1/tx/{{submit-tx.tx_id}}
        expect_json:
          eq:
            status: "included"

  - id: persistence
    name: "Persist across restart (Node A)"
    steps:
      - run: sudo systemctl restart ippan
      - wait_for:
          timeout_ms: 8000
          every_ms: 500
          run: curl -sS ${NODE_A}/api/v1/status
          expect_json:
            gt:
              height: 0
      - run: curl -sS ${NODE_A}/api/v1/tx/{{submit-tx.tx_id}}
        expect_json:
          eq:
            status: "included"

  - id: invalid-sig
    name: "Reject invalid signature"
    setup:
      - corrupt_sig: /tmp/tx.json
    steps:
      - run: curl -sS -X POST ${NODE_A}/api/v1/tx/submit -H "Content-Type: application/json" --data @/tmp/tx.json
        expect_http:
          status: 400

  - id: double-spend
    name: "Reject double spend (same nonce)"
    steps:
      - run: curl -sS -X POST ${NODE_A}/api/v1/tx/submit -H "Content-Type: application/json" --data @/tmp/tx.json
        expect_http:
          status: 400