[package]
name = "ippan"
version = "0.1.0"
edition = "2021"
authors = ["IPPAN Team"]
description = "Immutable Proof & Availability Network - A fully decentralized Layer-1 blockchain with built-in global DHT storage"
license = "MIT"

[workspace]
members = [
  "crates/neuro-core",
  "crates/neuro-ledger",
  "crates/neuro-api",
  "crates/neuro-proto",
  "crates/neuro-executor",
  "apps/neuro-cli",
]
resolver = "2"

[dependencies]
# Core dependencies
tokio = { version = "1.0", features = ["full"] }
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Cryptography
ed25519-dalek = "2.0"
sha2 = "0.10"
ripemd = "0.1"
aes = "0.8"
aes-gcm = "0.10"
rand = "0.8"
rand_core = "0.6"
sha3 = "0.10"

# TLS/DTLS for secure P2P communications
rustls = { version = "0.21", features = ["dangerous_configuration"] }
rustls-pemfile = "1.0"
rustls-native-certs = "0.7"
webpki-roots = "0.25"
tokio-rustls = "0.24"

# Networking (simplified for initial build)
# libp2p = { version = "0.52", features = ["tokio", "macros"] }
# libp2p-core = "0.40"
# libp2p-swarm = "0.42"
# libp2p-kad = "0.22"
# libp2p-noise = "0.42"
# libp2p-yamux = "0.42"
# libp2p-tcp = "0.42"

# Database and storage (simplified for initial build)
# sled = "0.34"
# rocksdb = "0.21"

# Time and utilities
chrono = { version = "0.4", features = ["serde"] }
time = "0.3"
uuid = { version = "1.0", features = ["v4", "serde"] }
dirs = "5.0"
hex = "0.4"
toml = "0.8"
bs58 = "0.5"

# Logging and configuration
log = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tracing-appender = "0.2"
config = "0.13"
clap = { version = "4.0", features = ["derive"] }

# Merkle trees and proofs
# merkle-tree = "0.1"
# merkle-proof = "0.1"

# Async runtime utilities
futures = "0.3"
async-trait = "0.1"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# HTTP and API
axum = "0.6"
base64 = "0.21"
hyper = "0.14"
tower = "0.4"
tower-http = { version = "0.4", features = ["cors"] }
chacha20poly1305 = "0.10.1"
reqwest = { version = "0.12.22", features = ["json"] }
lettre = { version = "0.11.18", default-features = false, features = ["tokio1", "tokio1-native-tls"] }

# System info
sysinfo = "0.29"

# Development dependencies
[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"
proptest = "1.3"
quickcheck = "1.0"
tempfile = "3.2"

# Benchmarking
[[bench]]
name = "consensus_benchmarks"
harness = false

[[bench]]
name = "storage_benchmarks"
harness = false

[[bench]]
name = "wallet_benchmarks"
harness = false

[[bench]]
name = "network_benchmarks"
harness = false

# Examples
# [[example]]
# name = "two_nodes_demo"
# path = "examples/two_nodes_demo.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
