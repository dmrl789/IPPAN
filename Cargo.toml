[package]
name = "ippan-core"
version = "0.1.0"
edition = "2021"

[dependencies]
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bs58 = "0.4"
ripemd = "0.1"
sha2 = "0.10"
ed25519-dalek = "2.1.1"
argon2 = "0.5"
bip39 = "1.1.0"
qrcode = "0.12"
image = "0.23"
hex = "0.4"
aes-gcm = "0.10"
tokio = { version = "1", features = ["full"] }


