[package]
name = "ippan-core"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.8"
bip39 = "1.2"
bs58 = "0.4"
hex = "0.4"
sha2 = "0.10"
bincode = "1.3"
chrono = { version = "0.4", features = ["serde"] }
ed25519-dalek = { version = "2.1.1", features = ["rand_core"] }
warp = "0.3"
tokio = { version = "1", features = ["full"] }
