[package]
name = "ippan"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core dependencies
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
hex = "0.4"
base58 = "0.2"
sha2 = "0.10"
blake3 = "0.4"

# Cryptography
ed25519-dalek = { version = "2.0", features = ["batch"] }
rand = "0.8"
rand_core = "0.6"

# P2P networking
libp2p = { version = "0.53", features = ["tokio", "macros", "mdns", "kad", "gossipsub", "identify", "ping"] }
libp2p-core = "0.41"
libp2p-swarm = "0.42"

# Async runtime and utilities
futures = "0.3"
async-trait = "0.1"
crossbeam = "0.8"
dashmap = "5.5"
parking_lot = "0.12"

# HTTP server
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Metrics and observability
prometheus = "0.13"
prometheus-client = "0.22"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# CLI
clap = { version = "4.0", features = ["derive"] }

# HTTP client for wallet CLI
reqwest = { version = "0.11", features = ["json"] }

# Database and storage
sled = "0.34"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4"] }
thiserror = "1.0"
anyhow = "1.0"

[dev-dependencies]
criterion = "0.5"
tokio-test = "0.4"

[[bench]]
name = "throughput"
harness = false

[profile.release]
lto = "thin"
codegen-units = 1
panic = "abort"
opt-level = 3
