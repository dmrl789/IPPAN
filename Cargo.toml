[package]
name = "ippan"
version = "0.1.0"
edition = "2021"
authors = ["IPPAN Team"]
description = "Immutable Proof & Availability Network - A fully decentralized Layer-1 blockchain with built-in global DHT storage"
license = "MIT"

[dependencies]
# Core dependencies
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Cryptography
ed25519-dalek = "2.0"
sha2 = "0.10"
ripemd = "0.1"
aes = "0.8"
aes-gcm = "0.10"
rand = "0.8"
rand_core = "0.6"

# Networking (simplified for initial build)
# libp2p = { version = "0.52", features = ["tokio", "macros"] }
# libp2p-core = "0.40"
# libp2p-swarm = "0.42"
# libp2p-kad = "0.22"
# libp2p-noise = "0.42"
# libp2p-yamux = "0.42"
# libp2p-tcp = "0.42"

# Database and storage (simplified for initial build)
# sled = "0.34"
# rocksdb = "0.21"

# Time and utilities
chrono = { version = "0.4", features = ["serde"] }
time = "0.3"
uuid = { version = "1.0", features = ["v4", "serde"] }
dirs = "5.0"
hex = "0.4"
toml = "0.8"
bs58 = "0.5"

# Logging and configuration
log = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
config = "0.13"
clap = { version = "4.0", features = ["derive"] }

# Merkle trees and proofs
# merkle-tree = "0.1"
# merkle-proof = "0.1"

# Async runtime utilities
futures = "0.3"
async-trait = "0.1"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# HTTP and API
axum = "0.6"
tower = "0.4"
tower-http = { version = "0.4", features = ["cors"] }

# Development dependencies
[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"
proptest = "1.3"
quickcheck = "1.0"

# Benchmarking
[[bench]]
name = "consensus_benchmarks"
harness = false

[[bench]]
name = "storage_benchmarks"
harness = false

[[bench]]
name = "wallet_benchmarks"
harness = false

[[bench]]
name = "network_benchmarks"
harness = false

# Examples
[[example]]
name = "two_nodes_demo"
path = "examples/two_nodes_demo.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
