name: Performance Testing

on:
  schedule:
    - cron: '0 3 * * 0' # Weekly on Sunday at 3 AM
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: Run performance tests
        run: |
          cargo test --features all-features --test performance_tests -- --nocapture

      - name: Run benchmarks
        run: cargo bench --features all-features

      - name: Run stress tests
        run: |
          cargo test --features all-features --test comprehensive_test_suite -- --nocapture

      - name: Generate performance report
        run: |
          mkdir -p performance-reports
          cargo test --features all-features --test performance_tests -- --nocapture > performance-reports/performance-test-results.txt
          cargo bench --features all-features > performance-reports/benchmark-results.txt

      - name: Upload performance reports
        uses: actions/upload-artifact@v3
        with:
          name: performance-reports
          path: performance-reports/

      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: target/criterion/

  load-test:
    name: Load Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build application
        run: |
          cargo build --release --features all-features

      - name: Start application
        run: |
          ./target/release/ippan --config config/default.toml &
          sleep 30

      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Create load test script
        run: |
          cat > load-test.js << 'EOF'
          import http from 'k6/http';
          import { check, sleep } from 'k6';

          export let options = {
            stages: [
              { duration: '2m', target: 100 }, // Ramp up to 100 users
              { duration: '5m', target: 100 }, // Stay at 100 users
              { duration: '2m', target: 200 }, // Ramp up to 200 users
              { duration: '5m', target: 200 }, // Stay at 200 users
              { duration: '2m', target: 0 },   // Ramp down to 0 users
            ],
          };

          export default function () {
            let response = http.get('http://localhost:8080/api/v1/status');
            check(response, {
              'status is 200': (r) => r.status === 200,
              'response time < 500ms': (r) => r.timings.duration < 500,
            });
            sleep(1);
          }
          EOF

      - name: Run load test
        run: k6 run load-test.js

      - name: Generate load test report
        run: |
          k6 run --out json=load-test-results.json load-test.js
          k6 run --out csv=load-test-results.csv load-test.js

      - name: Upload load test results
        uses: actions/upload-artifact@v3
        with:
          name: load-test-results
          path: load-test-results.*

  memory-test:
    name: Memory Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Build with debug symbols
        run: cargo build --features all-features

      - name: Run memory tests
        run: |
          valgrind --tool=memcheck --leak-check=full --show-leak-kinds=all --track-origins=yes \
            --log-file=memory-test-results.txt \
            cargo test --features all-features --test comprehensive_test_suite

      - name: Upload memory test results
        uses: actions/upload-artifact@v3
        with:
          name: memory-test-results
          path: memory-test-results.txt

  cpu-profiling:
    name: CPU Profiling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install perf
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-tools-common linux-tools-generic

      - name: Build with debug symbols
        run: cargo build --features all-features

      - name: Run CPU profiling
        run: |
          sudo perf record -g --call-graph dwarf \
            cargo test --features all-features --test performance_tests
          sudo perf report --stdio > cpu-profile-results.txt

      - name: Upload CPU profile results
        uses: actions/upload-artifact@v3
        with:
          name: cpu-profile-results
          path: cpu-profile-results.txt
