apiVersion: apps/v1
kind: Deployment
metadata:
  name: ippan-node
  labels:
    app: ippan-node
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ippan-node
  template:
    metadata:
      labels:
        app: ippan-node
    spec:
      containers:
      - name: ippan
        image: ippan:latest
        ports:
        - containerPort: 8080
          name: api
        - containerPort: 3000
          name: frontend
        - containerPort: 80
          name: http
        env:
        - name: RUST_LOG
          value: "info"
        - name: IPPAN_CONFIG_PATH
          value: "/config/default.toml"
        - name: IPPAN_DATA_DIR
          value: "/data"
        - name: IPPAN_KEYS_DIR
          value: "/keys"
        - name: IPPAN_LOG_DIR
          value: "/logs"
        - name: NODE_ENV
          value: "production"
        volumeMounts:
        - name: config-volume
          mountPath: /config
        - name: data-volume
          mountPath: /data
        - name: keys-volume
          mountPath: /keys
        - name: logs-volume
          mountPath: /logs
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config-volume
        configMap:
          name: ippan-config
      - name: data-volume
        persistentVolumeClaim:
          claimName: ippan-data-pvc
      - name: keys-volume
        secret:
          secretName: ippan-keys
      - name: logs-volume
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: ippan-service
spec:
  selector:
    app: ippan-node
  ports:
  - name: api
    port: 8080
    targetPort: 8080
  - name: frontend
    port: 3000
    targetPort: 3000
  - name: http
    port: 80
    targetPort: 80
  type: LoadBalancer

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ippan-config
data:
  default.toml: |
    [network]
    listen_addr = "0.0.0.0:8080"
    bootstrap_nodes = []
    max_connections = 1000
    connection_timeout = 30
    enable_nat = true
    enable_relay = true

    [storage]
    db_path = "/data/ippan.db"
    max_storage_size = 107374182400  # 100GB
    shard_size = 1048576  # 1MB
    replication_factor = 3
    enable_encryption = true
    proof_interval = 3600

    [consensus]
    block_time = 1000
    max_block_size = 1048576  # 1MB
    validator_count = 21
    stake_threshold = 1000000000  # 10 IPN

    [api]
    listen_addr = "0.0.0.0:8080"
    cors_origins = ["*"]
    rate_limit = 1000
    timeout = 30

    [logging]
    level = "info"
    format = "json"
    output = "stdout"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ippan-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: ippan-keys
type: Opaque
data:
  # Base64 encoded keys will be added here
  node.key: ""
  validator.key: ""