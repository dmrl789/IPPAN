<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<source>
  @type tail
  path /var/log/ippan/*.log
  pos_file /var/log/fluentd/ippan.log.pos
  tag ippan.logs
  format json
  time_key time
  time_format %Y-%m-%dT%H:%M:%S.%L%z
</source>

<source>
  @type tail
  path /var/log/nginx/*.log
  pos_file /var/log/fluentd/nginx.log.pos
  tag nginx.logs
  format nginx
</source>

<filter ippan.logs>
  @type parser
  key_name message
  reserve_data true
  <parse>
    @type json
  </parse>
</filter>

<filter nginx.logs>
  @type parser
  key_name message
  reserve_data true
  <parse>
    @type nginx
  </parse>
</filter>

<match ippan.logs>
  @type elasticsearch
  host elasticsearch
  port 9200
  index_name ippan-logs
  type_name _doc
  <buffer>
    @type file
    path /var/log/fluentd/buffers/ippan
    flush_mode interval
    flush_interval 5s
    chunk_limit_size 2m
    queue_limit_length 8
    retry_max_interval 30
    retry_forever true
  </buffer>
</match>

<match nginx.logs>
  @type elasticsearch
  host elasticsearch
  port 9200
  index_name nginx-logs
  type_name _doc
  <buffer>
    @type file
    path /var/log/fluentd/buffers/nginx
    flush_mode interval
    flush_interval 5s
    chunk_limit_size 2m
    queue_limit_length 8
    retry_max_interval 30
    retry_forever true
  </buffer>
</match>

<match **>
  @type stdout
</match>
