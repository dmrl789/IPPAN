global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # IPPAN Node metrics
  - job_name: 'ippan-node'
    static_configs:
      - targets: ['ippan-node:8080']
    metrics_path: '/metrics'
    scrape_interval: 5s
    scrape_timeout: 10s

  # Multi-node setup
  - job_name: 'ippan-multi-node'
    static_configs:
      - targets: 
        - 'ippan-node-1:8080'
        - 'ippan-node-2:8080'
        - 'ippan-node-3:8080'
    metrics_path: '/metrics'
    scrape_interval: 5s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):.*'
        replacement: '${1}'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter (if available)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
