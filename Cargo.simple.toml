[package]
name = "ippan"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
ed25519-dalek = "2.0"
rand = "0.8"
sha2 = "0.10"
blake3 = "1.5"
aes-gcm = "0.10"
bs58 = "0.5"
ripemd = "0.1"
aes = "0.8"
rand_core = "0.6"
sha3 = "0.10"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
hyper = { version = "0.14", features = ["full"] }
hyper-util = "0.1"
http-body-util = "0.1"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "fs"] }
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1.0"
thiserror = "1.0"
clap = { version = "4.0", features = ["derive"] }
sysinfo = "0.30"
libp2p = { version = "0.54", features = ["tcp", "yamux", "noise", "mdns", "kad", "identify", "ping"] }
multiaddr = "0.18"
peer-id = "0.2"
multihash = "0.18"
futures = "0.3"
async-trait = "0.1"
parking_lot = "0.12"
crossbeam = "0.8"
rayon = "1.7"
num_cpus = "1.15"
hex = "0.4"
base64 = "0.21"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
rust_decimal = { version = "1.32", features = ["serde"] }
rust_decimal_macros = "1.32"
