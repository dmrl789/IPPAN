#cloud-config
# IPPAN Hetzner Server Automated Setup
# This script will automatically configure your server on first boot

# Set hostname
hostname: ippan-mainnet-node
fqdn: ippan-mainnet-node.local

# Update system packages
package_update: true
package_upgrade: true

# Install essential packages
packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - ufw
  - fail2ban
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release

# Create IPPAN user
users:
  - name: ippan
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    lock_passwd: false
    passwd: $6$rounds=4096$salt$hashed_password_here

# Write files
write_files:
  # Docker daemon configuration
  - path: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "100m",
          "max-file": "3"
        },
        "storage-driver": "overlay2",
        "storage-opts": [
          "overlay2.override_kernel_check=true"
        ]
      }
    owner: root:root
    permissions: '0644'

  # Fail2ban configuration
  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 3

      [sshd]
      enabled = true
      port = ssh
      logpath = /var/log/auth.log
      maxretry = 3
    owner: root:root
    permissions: '0644'

  # System optimization
  - path: /etc/sysctl.d/99-ippan.conf
    content: |
      # Network optimization
      net.core.rmem_max = 134217728
      net.core.wmem_max = 134217728
      net.ipv4.tcp_rmem = 4096 65536 134217728
      net.ipv4.tcp_wmem = 4096 65536 134217728
      net.core.netdev_max_backlog = 5000
      net.ipv4.tcp_congestion_control = bbr

      # File system optimization
      fs.file-max = 2097152
      vm.swappiness = 10
    owner: root:root
    permissions: '0644'

  # IPPAN monitoring service
  - path: /etc/systemd/system/ippan-monitor.service
    content: |
      [Unit]
      Description=IPPAN Monitoring
      After=network.target

      [Service]
      Type=simple
      User=ippan
      ExecStart=/bin/bash -c 'while true; do echo "$(date): System running" >> /opt/ippan/mainnet/logs/health.log; sleep 60; done'
      Restart=always

      [Install]
      WantedBy=multi-user.target
    owner: root:root
    permissions: '0644'

# Run commands
runcmd:
  # Install Docker
  - curl -fsSL https://get.docker.com -o get-docker.sh
  - sh get-docker.sh
  - rm get-docker.sh

  # Install Docker Compose
  - curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
  - chmod +x /usr/local/bin/docker-compose

  # Create IPPAN directories
  - mkdir -p /opt/ippan/mainnet/{data,keys,logs,monitor,grafana,alertmanager,postgres,redis,nginx/logs,fluentd,backups,ssl}
  - chown -R ippan:ippan /opt/ippan
  - chmod -R 755 /opt/ippan

  # Configure UFW firewall
  - ufw --force reset
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow from 195.231.121.192 to any port 22
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 3000/tcp
  - ufw allow 8080/tcp
  - ufw allow from 195.231.121.192 to any port 9090
  - ufw allow from 195.231.121.192 to any port 3001
  - ufw --force enable

  # Configure SSH security
  - sed -i 's/#PermitRootLogin yes/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart ssh

  # Start and enable services
  - systemctl restart fail2ban
  - systemctl enable fail2ban
  - systemctl restart docker
  - systemctl enable docker

  # Apply system optimizations
  - sysctl -p /etc/sysctl.d/99-ippan.conf

  # Create setup completion marker
  - echo "IPPAN server setup completed at $(date)" > /opt/ippan/mainnet/logs/setup-complete.log
  - chown ippan:ippan /opt/ippan/mainnet/logs/setup-complete.log

# Final message
final_message: |
  IPPAN server setup completed successfully!
  
  Server Details:
  - Hostname: ippan-mainnet-node
  - User: ippan (with sudo access)
  - Docker: Installed and configured
  - Firewall: UFW configured with IPPAN rules
  - Security: Fail2ban enabled, SSH hardened
  
  Next Steps:
  1. Connect as ippan user: ssh ippan@YOUR_SERVER_IP
  2. Clone IPPAN repository: git clone https://github.com/dmrl789/IPPAN.git
  3. Configure environment variables
  4. Deploy IPPAN services
  
  Setup log: /opt/ippan/mainnet/logs/setup-complete.log
